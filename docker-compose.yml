services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/appdb
    depends_on:
      db:
        condition: service_healthy   # espera que postgres esté listo
    networks:
      - app-network

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"            # expuesto para conectarte desde tu IDE/DBeaver
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    volumes:
      - postgres_data:/var/lib/postgresql/data   # persiste los datos
      - ./init:/docker-entrypoint-initdb.d       # scripts SQL iniciales (opcional)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network: